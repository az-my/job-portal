name: Scrape Jobs

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Which portal to scrape"
        type: choice
        default: all
        options:
          - all
          - jobstreet
          - dealls
      max_pages:
        description: "Max pages per source"
        type: string
        default: "5"
  schedule:
    # Daily at 01:00 UTC (08:00 WIB)
    - cron: "0 1 * * *"

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install scraper dependencies
        working-directory: scraper
        run: npm ci

      - name: Run scraper
        working-directory: scraper
        run: npx tsx index.ts "${{ inputs.max_pages || '5' }}" "${{ inputs.source || 'all' }}"

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/db.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: scrape jobs (${{ inputs.source || 'all' }}, $(date -u +%Y-%m-%d))"
            git push
          fi
